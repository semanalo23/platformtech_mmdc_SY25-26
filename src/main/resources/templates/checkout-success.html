<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMark Corporation - Deployment Provisioned</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .success-card {
            background: #ffffff;
            padding: 44px;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }

        .success-icon {
            font-size: 52px;
            color: #38a169;
            margin-bottom: 16px;
        }

        .ref-box {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            color: #2b6cb0;
            font-family: monospace;
            font-size: 22px;
            font-weight: 800;
            padding: 14px;
            border-radius: 10px;
            margin: 24px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .details-list {
            text-align: left;
            font-size: 14px;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
            color: #4a5568;
        }

        .details-list p {
            margin: 10px 0;
            line-height: 1.5;
        }

        .btn-hub {
            display: block;
            margin-top: 32px;
            background: #2d3748;
            color: #ffffff;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn-hub:hover {
            background-color: #1a202c;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon">✓</div>
        <h2 style="margin: 0 0 8px 0; font-size: 24px; letter-spacing: -0.5px;">Service Sequence Triggered</h2>
        <p style="color: #718096; font-size: 14px; margin: 0;">Your enterprise framework checkout is finalized. Use the tracking reference below to trace deployment verification metrics.</p>
        
        <div class="ref-box" data-th-text="${refNumber}">FIN-00000-TX</div>
        
        <div class="details-list">
            <p><strong>Configured Scope:</strong> <span data-th-text="${orderSummary}">Selected Services</span></p>
            <p><strong>Total Invoiced Bill:</strong> <span style="font-weight: 700; color: #1a202c;">&#8369<span data-th-text="${totalAmount}">0.00</span></span></p>
        </div>

        <a href="/home" class="btn-hub">Return to Console Hub</a>
    </div>

</body>
</html>
